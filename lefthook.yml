pre-commit:
  piped: true
  follow: true

  commands:
    fmt:
      run: cargo fmt --check

    clippy:
      run: CARGO_BUILD_JOBS=4 cargo clippy -- -D warnings

    build:
      run: CARGO_BUILD_JOBS=4 cargo build --workspace

    test:
      run: CARGO_BUILD_JOBS=4 cargo llvm-cov --fail-under-lines 80 --workspace
