name: Test

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  cli:
    name: CLI
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false

      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

        with:
          ref: ${{ inputs.ref || github.ref }}

      - if: matrix.os == 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@stable
        name: Install Rust Toolchain With Coverage Tools

        with:
          components: llvm-tools-preview

      - if: matrix.os != 'ubuntu-latest'
        uses: dtolnay/rust-toolchain@stable
        name: Install Rust Toolchain

      - uses: Swatinem/rust-cache@v2
        name: Cache Cargo

      - if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-llvm-cov
        name: Install cargo-llvm-cov

      - if: matrix.os == 'ubuntu-latest'
        run: CARGO_BUILD_JOBS=4 cargo llvm-cov --fail-under-lines 80 --workspace --html
        name: Run Tests and Coverage

      - if: matrix.os != 'ubuntu-latest'
        run: cargo test --workspace --locked
        name: Run Workspace Tests

        env:
          CARGO_BUILD_JOBS: 4

      - if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        name: Upload Coverage Report

        with:
          name: gitfleet-coverage-${{ github.run_id }}
          path: target/llvm-cov/

  site:
    name: Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: gitfleet-site

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm

        with:
          package_json_file: gitfleet-site/package.json
          run_install: false

      - uses: actions/setup-node@v7
        name: Install Node.js

        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: gitfleet-site/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        name: Install Dependencies

      - run: pnpm build
        name: Build Static Site Fixture

        env:
          ASTRO_TELEMETRY_DISABLED: "1"

      - run: pnpm test
        name: Run Unit Tests

      - run: pnpm test:integration
        name: Run Integration Tests
