name: Verify

on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: ""

permissions:
  contents: read

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        name: Install Rust Toolchain

        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        name: Cache Cargo

      - run: cargo fmt --check
        name: Check Formatting

      - run: CARGO_BUILD_JOBS=4 cargo clippy -- -D warnings
        name: Lint Code

      - run: CARGO_BUILD_JOBS=4 cargo check --workspace --locked
        name: Check Compilation

      - run: find gitfleet-playbooks -maxdepth 1 -name '*.sh' -exec bash -n {} +
        name: Check Playbook Syntax

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: dtolnay/rust-toolchain@1.89
        name: Install MSRV Toolchain

      - uses: Swatinem/rust-cache@v2
        name: Cache Cargo

      - run: CARGO_BUILD_JOBS=4 cargo check --workspace --locked
        name: Check MSRV Compilation

  site:
    name: Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: gitfleet-site

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v6
        name: Install pnpm

        with:
          package_json_file: gitfleet-site/package.json
          run_install: false

      - uses: actions/setup-node@v7
        name: Install Node.js

        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: gitfleet-site/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        name: Install Dependencies

      - run: pnpm format:check
        name: Check Formatting

      - run: pnpm lint
        name: Lint and Type Check

      - run: pnpm test
        name: Run Unit Tests
