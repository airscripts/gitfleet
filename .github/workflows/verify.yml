name: Verify

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

      - uses: dtolnay/rust-toolchain@stable
        name: Install Rust Toolchain

        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        name: Cache Cargo

      - run: cargo fmt --check
        name: Check Formatting

      - run: CARGO_BUILD_JOBS=4 cargo clippy -- -D warnings
        name: Lint Code

      - run: CARGO_BUILD_JOBS=4 cargo check --workspace --locked
        name: Check Compilation

      - run: find gitfleet-playbooks -maxdepth 1 -name '*.sh' -exec bash -n {} +
        name: Check Playbook Syntax

  msrv:
    name: MSRV
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

      - uses: dtolnay/rust-toolchain@1.89
        name: Install MSRV Toolchain

      - uses: Swatinem/rust-cache@v2
        name: Cache Cargo

      - run: CARGO_BUILD_JOBS=4 cargo check --workspace --locked
        name: Check MSRV Compilation
