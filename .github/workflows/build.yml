name: Build

on:
  workflow_call:

permissions:
  contents: read

jobs:
  cli:
    name: CLI

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

      - uses: dtolnay/rust-toolchain@stable
        name: Install Rust Toolchain

      - uses: Swatinem/rust-cache@v2
        name: Cache Cargo

      - run: cargo build --release --locked
        name: Build Release Binary

        env:
          CARGO_BUILD_JOBS: 4

      - run: cargo run --release --bin gitfleet -- --help
        name: Test CLI Help

      - run: cargo run --release --bin gitfleet -- version
        name: Test CLI Version

  site:
    name: Site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: gitfleet-site

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

      - uses: pnpm/action-setup@v6
        name: Install pnpm

        with:
          package_json_file: gitfleet-site/package.json
          run_install: false

      - uses: actions/setup-node@v7
        name: Install Node.js

        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: gitfleet-site/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile
        name: Install Dependencies

      - run: pnpm build
        name: Build Static Site

        env:
          ASTRO_TELEMETRY_DISABLED: "1"
