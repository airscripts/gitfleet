name: Prepare

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

    outputs:
      version:
        value: ${{ jobs.cli.outputs.version }}

      prerelease:
        value: ${{ jobs.cli.outputs.prerelease }}

      tag:
        value: ${{ jobs.cli.outputs.tag }}

permissions:
  contents: read

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      version: ${{ steps.version.outputs.version }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - uses: actions/checkout@v7
        name: Checkout Code

        with:
          ref: ${{ inputs.tag }}

      - id: version
        run: |
          set -euo pipefail

          raw_tag="${{ inputs.tag }}"
          tag="${raw_tag#refs/tags/}"
          version="${tag#v}"

          bash gitfleet-scripts/release-notes.sh "$tag" release-notes.md

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          {
            echo "tag=$tag"
            echo "version=$version"
            echo "prerelease=$prerelease"
          } >> "$GITHUB_OUTPUT"

          echo "Prepared release $tag"

        name: Validate Release Version

      - uses: actions/upload-artifact@v7
        name: Upload Release Notes

        with:
          name: gitfleet-release-notes-${{ steps.version.outputs.version }}
          path: release-notes.md
          if-no-files-found: error
